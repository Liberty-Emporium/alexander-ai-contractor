{% extends "base.html" %}
{% block title %}AI Bid Creator{% endblock %}
{% block content %}
<h2><i class="bi bi-file-earmark-text"></i> AI Bid Creator</h2>

<div class="card mt-4">
    <div class="card-body">
        <div class="mb-3">
            <label>Project Type</label>
            <select id="project_type" class="form-select">
                <option value="deck">Deck Building</option>
                <option value="kitchen">Kitchen Remodel</option>
                <option value="bathroom">Bathroom Remodel</option>
                <option value="roofing">Roofing</option>
                <option value="fencing">Fencing</option>
                <option value="plumbing">Plumbing</option>
                <option value="electrical">Electrical</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="mb-3">
            <label>Project Details</label>
            <textarea id="details" class="form-control" rows="4" placeholder="Describe the project in detail..."></textarea>
        </div>
        <div class="mb-3">
            <label>Location (City/State)</label>
            <input type="text" id="location" class="form-control" placeholder="e.g., Denver, CO">
        </div>
        <button onclick="createBid()" class="btn btn-primary">🤖 Generate AI Bid</button>
        <div id="bid-result" class="mt-4"></div>
    </div>
</div>

<script>
function createBid() {
    document.getElementById('bid-result').innerHTML = '<p>Generating bid...</p>';
    fetch('/api/create-bid', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            project_type: document.getElementById('project_type').value,
            details: document.getElementById('details').value,
            location: document.getElementById('location').value
        })
    }).then(r => r.json()).then(data => {
        if (data.success) {
            document.getElementById('bid-result').innerHTML = '<div class="card"><div class="card-body">' + data.bid.content + '</div></div>';
        } else {
            document.getElementById('bid-result').innerHTML = '<p class="text-danger">Error: ' + data.error + '</p>';
        }
    });
}
</script>
{% endblock %}
<style>.ai-response { white-space: pre-wrap; word-wrap: break-word; }</style>
