{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<h2>🔐 Change Password</h2>

<div class="card mt-4">
    <div class="card-body">
        <form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password" class="form-control" required minlength="4" placeholder="Enter new password">
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" required minlength="4" placeholder="Confirm new password">
            </div>
            <button type="submit" class="btn btn-primary">Change Password</button>
            <a href="/dashboard" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
