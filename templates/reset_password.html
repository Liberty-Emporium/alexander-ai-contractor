<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — Contractor Pro AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body{background:#f8f9fa;} .card{border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.1);}</style>
</head>
<body>
<div style="max-width:440px;margin:4rem auto;padding:0 1rem;">
  <div class="card p-4">
    <h2 class="fw-bold mb-1">🔐 Set New Password</h2>
    <p class="text-muted small mb-3">Resetting password for <strong>{{ email }}</strong></p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{% if cat=='error' %}danger{% else %}success{% endif %} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3"><label class="form-label fw-bold small">New Password</label>
        <input class="form-control" type="password" name="password" required autofocus minlength="6" placeholder="Minimum 6 characters"></div>
      <button class="btn btn-success w-100 fw-bold">Set New Password →</button>
    </form>
  </div>
</div>
</body></html>
