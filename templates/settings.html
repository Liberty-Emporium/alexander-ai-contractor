{% extends "base.html" %}
{% block title %}API Settings{% endblock %}
{% block content %}
<h2>⚙️ API Settings</h2>

<div class="card mt-4">
    <div class="card-header"><h5>🤖 AI API Keys</h5></div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Groq API Key</label>
                <input type="password" name="groq_key" class="form-control" value="{{ groq_key }}" placeholder="gsk_...">
                {% if groq_key %}
                <span class="text-success">✓ Saved</span>
                {% endif %}
            </div>
            <div class="mb-3">
                <label class="form-label">Qwen API Key</label>
                <input type="password" name="qwen_key" class="form-control" value="{{ qwen_key }}" placeholder="sk-...">
                {% if qwen_key %}
                <span class="text-success">✓ Saved</span>
                {% endif %}
            </div>
            <button type="submit" class="btn btn-primary">Save Keys</button>
        </form>
    </div>
</div>

<div class="mt-3">
    <a href="/dashboard" class="btn btn-secondary">← Back to Dashboard</a>
</div>
{% endblock %}
